name: check

on:
  push:
    branches:
      - "**"
    paths:
      - ".github/workflows/check.yml"
      - "assets/**"
      - "**.py"
  pull_request:
    branches:
      - "**"
    paths:
      - ".github/workflows/check.yml"
      - "assets/**"
      - "**.py"
  workflow_dispatch:

jobs:
  resource:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run maa-checker
        run: |
          npx @nekosu/maa-checker@latest ./assets/interface.json --github=.


      - name: Install maafw (from requirements.txt)
        run: |
          python -m pip install --upgrade pip
          # 在 requirements.txt 中查找以 maafw 开头的行（例如: maafw==5.1.0 或 maafw>=4.5）
          pkg=$(grep -E '^\s*maafw' requirements.txt | head -1 | tr -d '[:space:]')
          if [ -z "$pkg" ]; then
            pkg='maafw'
          fi
          echo "Installing $pkg"
          python -m pip install --upgrade "$pkg"

      - name: Check Resource
        run: |
            python ./tools/ci/check_resource.py ./assets/resource/base/ ./assets/resource/bilibili/